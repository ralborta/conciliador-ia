[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python main.py"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

[env]
# Estas variables se configurarán en Railway Dashboard
# OPENAI_API_KEY = ""
# DATABASE_URL = ""
# DEBUG = "False"
# HOST = "0.0.0.0"
# PORT = "8000"